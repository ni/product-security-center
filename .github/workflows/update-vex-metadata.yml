name: Update VEX Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'csaf/vex/**/*.json'
  pull_request:
    paths:
      - 'csaf/vex/**/*.json'

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Generate metadata files
        run: |
          python scripts/generate_csaf_metadata.py --directory vex
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update vex metadata files'
          title: 'Update CSAF metadata (hashes and index)'
          body: |
            Auto-generated PR to update metadata files based on changes to CSAF VEX documents.
            
            This PR updates:
            - `csaf/vex/index.txt`
            - `csaf/vex/changes.csv`
          branch: csaf-updates
          delete-branch: true
          add-paths: |
            csaf/vex/index.txt
            csaf/vex/changes.csv
