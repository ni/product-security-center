name: Generate CSAF Hash Files

on:
  push:
    branches:
      - main
    paths:
      - 'csaf/advisories/**/*.json'
      - 'csaf/vex/**/*.json'
  pull_request:
    paths:
      - 'csaf/advisories/**/*.json'
      - 'csaf/vex/**/*.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-hashes:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch current and previous commit to detect changes
      
      - name: Detect changed CSAF documents
        id: detect-changes
        run: |
          # Get list of changed .json files in csaf/advisories and csaf/vex
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep -E '^csaf/(advisories|vex)/.*\.json$' | grep -v '\.sha512$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No CSAF documents changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed CSAF documents:"
            echo "$CHANGED_FILES"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            # Save the list for next step
            echo "$CHANGED_FILES" > /tmp/changed_files.txt
          fi
      
      - name: Generate SHA-512 hash files
        if: steps.detect-changes.outputs.has_changes == 'true'
        run: |
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              echo "Generating SHA-512 hash for: $file"
              
              # Generate hash in the format: <hash>  <filename>
              # Use sha512sum which outputs in the correct format
              HASH_OUTPUT=$(sha512sum "$file")
              
              # Extract just the filename (not the full path) for the hash file content
              FILENAME=$(basename "$file")
              HASH_VALUE=$(echo "$HASH_OUTPUT" | awk '{print $1}')
              
              # Create hash file with format: <hash>  <filename>
              echo "$HASH_VALUE  $FILENAME" > "${file}.sha512"
              
              echo "Created: ${file}.sha512"
            fi
          done < /tmp/changed_files.txt
      
      - name: Create Pull Request
        if: steps.detect-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Generate SHA-512 hash files for CSAF documents"
          branch: csaf-updates
          base: main
          title: "Update CSAF metadata (hashes and index)"
          body: |
            This PR contains automated updates to CSAF metadata:
            
            - SHA-512 hash files for new/modified CSAF documents
            
            **Changed CSAF documents:**
            ```
            ${{ steps.detect-changes.outputs.changed_files }}
            ```
            
            Generated by the [generate-csaf-hashes workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: automated, csaf
          add-paths: |
            csaf/advisories/**/*.sha512
            csaf/vex/**/*.sha512
