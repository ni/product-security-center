name: Update CSAF Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'csaf/advisories/**/*.json'
      - 'csaf/vex/**/*.json'
  pull_request:
    paths:
      - 'csaf/advisories/**/*.json'
      - 'csaf/vex/**/*.json'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-csaf-metadata:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch current and previous commit to detect changes
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Detect changed CSAF documents
        id: detect-changes
        run: |
          # Get list of changed .json files in csaf/advisories and csaf/vex
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep -E '^csaf/(advisories|vex)/.*\.json$' | grep -v '\.sha512$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No CSAF documents changed"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed CSAF documents:"
          echo "$CHANGED_FILES"
          echo "has_changes=true" >> $GITHUB_OUTPUT
          
          # Detect which subdirectories have changes
          ADVISORIES_CHANGED=$(echo "$CHANGED_FILES" | grep '^csaf/advisories/' || true)
          VEX_CHANGED=$(echo "$CHANGED_FILES" | grep '^csaf/vex/' || true)
          
          if [ -n "$ADVISORIES_CHANGED" ]; then
            echo "advisories_changed=true" >> $GITHUB_OUTPUT
          else
            echo "advisories_changed=false" >> $GITHUB_OUTPUT
          fi
          
          if [ -n "$VEX_CHANGED" ]; then
            echo "vex_changed=true" >> $GITHUB_OUTPUT
          else
            echo "vex_changed=false" >> $GITHUB_OUTPUT
          fi
          
          # Save changed files for hash generation
          echo "$CHANGED_FILES" > /tmp/changed_files.txt
          
          # Export as multiline output
          {
            echo 'changed_files<<EOF'
            echo "$CHANGED_FILES"
            echo 'EOF'
          } >> $GITHUB_OUTPUT
      
      - name: Generate SHA-512 hashes
        if: steps.detect-changes.outputs.has_changes == 'true'
        uses: ./.github/actions/generate-csaf-hashes
        with:
          changed-files: ${{ steps.detect-changes.outputs.changed_files }}
      
      - name: Generate advisories metadata
        if: steps.detect-changes.outputs.advisories_changed == 'true'
        uses: ./.github/actions/generate-csaf-metadata
        with:
          directory: advisories
      
      - name: Generate VEX metadata
        if: steps.detect-changes.outputs.vex_changed == 'true'
        uses: ./.github/actions/generate-csaf-metadata
        with:
          directory: vex
      
      - name: Create Pull Request
        if: steps.detect-changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CSAF metadata (hashes and index)"
          branch: chore/csaf-updates
          base: ${{ github.head_ref || github.ref_name }}
          title: "Update CSAF metadata (hashes and index)"
          body: |
            This PR contains automated updates to CSAF metadata:
            
            - SHA-512 hash files for new/modified CSAF documents
            - Updated index.txt and changes.csv files
            
            **Changed CSAF documents:**
            ```
            ${{ steps.detect-changes.outputs.changed_files }}
            ```
            
            **Updated directories:**
            ${{ steps.detect-changes.outputs.advisories_changed == 'true' && '- csaf/advisories/' || '' }}
            ${{ steps.detect-changes.outputs.vex_changed == 'true' && '- csaf/vex/' || '' }}
            
            Generated by the [Update CSAF Metadata workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: automated, csaf
          delete-branch: true
          add-paths: |
            csaf/advisories/**/*.sha512
            csaf/advisories/index.txt
            csaf/advisories/changes.csv
            csaf/vex/**/*.sha512
            csaf/vex/index.txt
            csaf/vex/changes.csv
