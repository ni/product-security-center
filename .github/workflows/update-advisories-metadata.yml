name: Update Advisories Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'csaf/advisories/**/*.json'
  pull_request:
    paths:
      - 'csaf/advisories/**/*.json'

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Generate metadata files
        run: |
          python scripts/generate_csaf_metadata.py --directory advisories
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update advisories metadata files'
          title: 'Update CSAF metadata (hashes and index)'
          body: |
            Auto-generated PR to update metadata files based on changes to CSAF advisories.
            
            This PR updates:
            - `csaf/advisories/index.txt`
            - `csaf/advisories/changes.csv`
          branch: chore/csaf-updates
          base: ${{ github.head_ref || github.ref_name }}
          delete-branch: true
          add-paths: |
            csaf/advisories/index.txt
            csaf/advisories/changes.csv
